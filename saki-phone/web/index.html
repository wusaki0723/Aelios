<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>咲手机</title>
  <meta name="theme-color" content="#F3E5E9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="咲手机">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/icons/app-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
/* ========================================
   CSS Variables - Romantic Glassmorphism
   ======================================== */
:root {
  --bg-base: #F3E5E9;
  --bg-gradient-start: #F5E8EC;
  --bg-gradient-end: #E3C1CB;
  --petal-pink: #F8D7E0;
  --deep-mauve: #8E606D;
  --text-shadow-color: rgba(142, 96, 109, 0.2);
  --glass-surface: rgba(255, 255, 255, 0.45);
  --glass-border: rgba(255, 255, 255, 0.6);
  --glass-highlight: rgba(255, 255, 255, 0.8);
  --primary-text: #6A444F;
  --secondary-text: #9C7883;
  --white: #FFFFFF;
  --accent: #D68C9E;
  --accent-light: #F0C6D0;
  --success: #A6E2B6;
  --success-dark: #5CB85C;
  --danger: #E57373;
  --danger-bg: rgba(229,115,115,0.12);
  --warning: #FFB74D;
  --warning-bg: rgba(255,183,77,0.12);
  --info: #7BAAF7;
  --info-bg: rgba(123,170,247,0.12);
  --radius-lg: 32px;
  --radius-md: 24px;
  --radius-sm: 16px;
  --radius-xs: 10px;
  --space-xs: 8px;
  --space-sm: 16px;
  --space-md: 24px;
  --space-lg: 32px;
  --font-display: 'Cinzel Decorative', cursive;
  --font-body: 'Quicksand', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

/* ========================================
   Reset & Base
   ======================================== */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-body);
  background-color: var(--bg-base);
  color: var(--primary-text);
  display: flex; justify-content: center; align-items: center;
}

/* ========================================
   Device Frame
   ======================================== */
.device {
  width: 100%; height: 100%; max-width: 420px;
  background: linear-gradient(160deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
}

/* Ambient flower blurs */
.ambient-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
.flower-blur { position: absolute; border-radius: 50%; filter: blur(20px); opacity: 0.6; }
.flower-blur.f1 { width: 300px; height: 300px; top: -50px; left: -100px; background: radial-gradient(circle, rgba(255,230,235,0.8) 0%, transparent 70%); }
.flower-blur.f2 { width: 250px; height: 250px; bottom: 100px; right: -80px; background: radial-gradient(circle, rgba(248,215,224,0.6) 0%, transparent 70%); }
.flower-blur.f3 { width: 150px; height: 150px; top: 40%; left: 60%; background: radial-gradient(circle, rgba(255,230,235,0.8) 0%, transparent 70%); }

/* ========================================
   SVG Icon System
   ======================================== */
.icon { width: 22px; height: 22px; display: inline-block; vertical-align: middle; flex-shrink: 0; }
.icon-sm { width: 16px; height: 16px; }
.icon-lg { width: 28px; height: 28px; }
.icon-xl { width: 48px; height: 48px; }
svg.icon, svg.icon-sm, svg.icon-lg, svg.icon-xl { fill: none; stroke: currentColor; }

/* ========================================
   Status Bar
   ======================================== */
.status-bar {
  height: 44px; padding: 0 var(--space-md);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 14px; font-weight: 600; color: var(--primary-text);
  z-index: 10; mix-blend-mode: multiply;
}
.status-icons { display: flex; gap: 6px; align-items: center; }

/* ========================================
   Main Content Container
   ======================================== */
.content-area {
  flex: 1; z-index: 5; position: relative; overflow: hidden;
}

/* Pages */
.page {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: none; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.page::-webkit-scrollbar { display: none; }
.page.active { display: flex; animation: fadeIn 0.25s ease-out; }

.page-inner {
  padding: 0 var(--space-md) 100px var(--space-md);
  flex: 1;
}

/* ========================================
   Glass Card
   ======================================== */
.card {
  background: var(--glass-surface);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  margin-bottom: var(--space-sm);
  box-shadow: 0 8px 32px rgba(142,96,109,0.08);
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
  opacity: 0.5;
}

/* ========================================
   Page Header
   ======================================== */
.page-header {
  display: flex; align-items: center; gap: var(--space-xs);
  padding: var(--space-sm) 0;
  position: sticky; top: 0;
  background: linear-gradient(to bottom, var(--bg-gradient-start) 60%, transparent);
  z-index: 5;
}
.page-header .page-title {
  flex: 1; font-family: var(--font-display); font-size: 18px;
  color: var(--primary-text); font-weight: 700;
}
.page-actions {
  display: flex; align-items: center; gap: 8px;
}
.back-btn {
  display: flex; align-items: center; gap: 2px;
  background: none; border: none; color: var(--deep-mauve);
  font-family: var(--font-body); font-size: 14px; font-weight: 600;
  cursor: pointer; padding: 6px 4px;
}
.back-btn svg { width: 18px; height: 18px; }

/* ========================================
   HOME PAGE
   ======================================== */
.home-header {
  margin-top: var(--space-sm); margin-bottom: var(--space-lg);
  text-align: center;
}
.home-header h1 {
  font-family: var(--font-display); color: var(--white);
  font-size: 28px; font-weight: 700;
  text-shadow: 0 4px 12px var(--text-shadow-color);
  margin-bottom: 4px;
}
.home-header .subtitle {
  color: var(--deep-mauve); font-size: 13px; font-weight: 500;
  letter-spacing: 1px; text-transform: uppercase; opacity: 0.8;
}

/* Partner Card */
.partner-card {
  display: flex; flex-direction: column; align-items: center;
  padding: 32px var(--space-md);
  background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 100%);
}
.avatar-container {
  width: 96px; height: 96px; border-radius: 50%;
  border: 3px solid var(--white);
  box-shadow: 0 8px 20px rgba(142,96,109,0.15);
  background: #E8D0D6; margin-bottom: var(--space-sm);
  position: relative; display: flex; justify-content: center; align-items: center;
  overflow: hidden;
}
.avatar-placeholder { width: 100%; height: 100%; background: linear-gradient(to bottom, #F3E5E9, #DDBBC4); }
.avatar-status {
  position: absolute; bottom: 4px; right: 4px;
  width: 16px; height: 16px; background: var(--success);
  border: 2px solid var(--white); border-radius: 50%;
}
.partner-name {
  font-family: var(--font-display); font-size: 24px;
  color: var(--primary-text); margin-bottom: 4px;
}
.gateway-status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.5);
  padding: 4px 12px; border-radius: 20px;
  font-size: 12px; color: var(--deep-mauve); font-weight: 600;
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
.status-dot.online { background: var(--success); }
.status-dot.offline { background: var(--danger); }

/* Action Grid */
.grid-2 {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: var(--space-sm); margin-bottom: var(--space-sm);
}
.action-card {
  display: flex; flex-direction: column; justify-content: space-between;
  height: 120px; cursor: pointer; transition: transform 0.2s ease;
}
.action-card:active { transform: scale(0.97); }
.icon-box {
  width: 40px; height: 40px;
  background: rgba(255,255,255,0.6); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  color: var(--deep-mauve); font-size: 20px;
}
.card-label { font-size: 15px; font-weight: 600; color: var(--primary-text); }
.card-sub { font-size: 12px; color: var(--secondary-text); }

/* List Group */
.list-group {
  background: var(--glass-surface);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-radius: var(--radius-md); padding: 8px;
  border: 1px solid var(--glass-border);
  margin-bottom: var(--space-sm);
}
.list-item {
  display: flex; align-items: center;
  padding: 14px; border-radius: var(--radius-sm);
  transition: background 0.2s; cursor: pointer;
}
.list-item:active { background: rgba(255,255,255,0.3); }
.list-icon {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.5); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin-right: 14px; color: var(--deep-mauve);
}
.list-content { flex: 1; }
.list-title { font-size: 15px; font-weight: 600; color: var(--primary-text); margin-bottom: 2px; }
.list-desc { font-size: 12px; color: var(--secondary-text); }
.chevron { color: var(--secondary-text); opacity: 0.5; font-size: 18px; }

/* Section Title */
.section-header {
  display: flex; justify-content: space-between; align-items: baseline;
  margin: var(--space-md) 0 var(--space-sm);
  padding: 0 4px;
}
.section-title { font-family: var(--font-display); color: var(--primary-text); font-size: 18px; }
.section-link { font-size: 12px; color: var(--deep-mauve); font-weight: 600; cursor: pointer; }

/* Chat Preview */
.message-preview {
  background: rgba(255,255,255,0.7);
  padding: var(--space-sm); border-radius: 20px 20px 20px 4px;
  box-shadow: 0 4px 12px rgba(142,96,109,0.05);
  display: flex; gap: 12px; cursor: pointer;
}
.msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: #DDBBC4; flex-shrink: 0; }
.msg-content { flex: 1; }
.msg-name { font-size: 12px; font-weight: 700; color: var(--deep-mauve); margin-bottom: 4px; }
.msg-text { font-size: 14px; color: var(--primary-text); line-height: 1.4; }

/* ========================================
   CHAT PAGE
   ======================================== */
.chat-page-header {
  display: flex; align-items: center; padding: 8px var(--space-sm);
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--glass-border);
  z-index: 5;
}
.chat-page-header .page-title { flex: 1; text-align: center; }
.chat-messages {
  flex: 1; overflow-y: auto; padding: var(--space-sm);
  padding-bottom: calc(96px + env(safe-area-inset-bottom, 0px));
  scrollbar-width: none;
}
.chat-messages::-webkit-scrollbar { display: none; }

.chat-message { display: flex; gap: 10px; margin-bottom: 14px; align-items: flex-start; }
.chat-message.user { flex-direction: row-reverse; }
.chat-message.system { justify-content: center; }
.chat-message .message-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.6); display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  color: var(--deep-mauve);
}
.chat-message .message-body { max-width: 75%; }
.chat-message .message-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px; font-size: 11px; color: var(--secondary-text);
}
.chat-message.user .message-header { flex-direction: row-reverse; }
.message-bubbles {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.chat-message .message-bubble-inner {
  background: rgba(255,255,255,0.7); padding: 12px 16px;
  border-radius: 18px 18px 18px 4px;
  box-shadow: 0 2px 8px rgba(142,96,109,0.06);
  font-size: 14px; line-height: 1.5; color: var(--primary-text);
  word-break: break-word;
}
.chat-message .message-bubble-inner.segmented {
  animation: bubblePopIn 0.22s ease-out;
}
.chat-message.user .message-bubble-inner {
  background: linear-gradient(135deg, var(--petal-pink), var(--accent-light));
  border-radius: 18px 18px 4px 18px;
  color: var(--primary-text);
}
.chat-message.system .system-content {
  background: rgba(255,255,255,0.4); padding: 6px 14px;
  border-radius: 12px; font-size: 12px; color: var(--secondary-text);
}

/* Tool context indicator */
.tool-context-indicator {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; border-radius: 8px;
  background: var(--info-bg); font-size: 11px; color: var(--info);
  margin-bottom: 6px;
}

/* Typing indicator */
.typing-dots { display: flex; gap: 4px; padding: 4px 0; }
.typing-dots span {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--secondary-text); animation: typing 1s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

/* Chat input */
.attachment-preview {
  display:none;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 12px 8px 12px;
}
.attachment-chip {
  display:inline-flex; align-items:center; gap:8px;
  background: rgba(255,255,255,0.72); border:1px solid var(--glass-border);
  border-radius: 999px; padding: 6px 10px; font-size: 12px; color: var(--primary-text);
  max-width: 100%;
}
.attachment-chip span { max-width: 180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.attachment-chip button { border:none; background:none; color: var(--deep-mauve); font-size:16px; line-height:1; cursor:pointer; }
.chat-plus-btn {
  width: 40px; height: 40px; border-radius: 50%; border:none;
  background: rgba(255,255,255,0.7); color: var(--deep-mauve);
  display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer;
  box-shadow: 0 2px 8px rgba(142,96,109,0.08);
}
.install-app-btn {
  display:none; align-items:center; gap:6px; border:none; cursor:pointer;
  background: rgba(255,255,255,0.55); color: var(--deep-mauve); padding: 8px 12px; border-radius: 999px; font-weight: 600;
}
.chat-input-area {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 10px var(--space-sm); padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--glass-border);
  position: sticky;
  bottom: calc(64px + env(safe-area-inset-bottom, 0px));
  z-index: 40;
}
.chat-input-area textarea {
  flex: 1; border: 1px solid var(--glass-border);
  background: rgba(255,255,255,0.6); border-radius: 20px;
  padding: 10px 16px; font-size: 14px; font-family: var(--font-body);
  color: var(--primary-text); resize: none; outline: none;
  max-height: 100px; line-height: 1.4;
}
.chat-input-area textarea:focus { border-color: var(--accent); }
.chat-tool-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.5); border: none;
  display: flex; align-items: center; justify-content: center;
  color: var(--deep-mauve); cursor: pointer; flex-shrink: 0;
}
.chat-send-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--deep-mauve));
  border: none; display: flex; align-items: center; justify-content: center;
  color: white; cursor: pointer; flex-shrink: 0;
}
.chat-send-btn svg { stroke: white; }

/* ========================================
   MEMORY PAGE
   ======================================== */
.memory-tabs {
  display: flex; gap: 6px; overflow-x: auto;
  padding: 4px 0 var(--space-sm);
  scrollbar-width: none;
}
.memory-tabs::-webkit-scrollbar { display: none; }
.memory-tab {
  display: flex; align-items: center; gap: 4px;
  padding: 8px 14px; border-radius: 20px;
  background: rgba(255,255,255,0.4); border: 1px solid var(--glass-border);
  font-size: 12px; font-weight: 600; color: var(--secondary-text);
  white-space: nowrap; cursor: pointer; flex-shrink: 0;
}
.memory-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.tab-count { font-size: 10px; opacity: 0.7; }
.memory-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-xs);
}
.memory-card {
  background: var(--glass-surface); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); overflow: hidden;
}
.memory-card-header {
  padding: 10px; display: flex; align-items: center; justify-content: space-between;
}
.memory-card-body { padding: 0 10px 10px; }
.memory-title { font-size: 13px; font-weight: 700; color: var(--primary-text); margin-bottom: 4px; }
.memory-content { font-size: 12px; color: var(--secondary-text); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.memory-card-footer {
  display: flex; justify-content: flex-end; gap: 4px;
  padding: 6px 10px; border-top: 1px solid rgba(255,255,255,0.3);
}
.memory-date { font-size: 10px; color: var(--secondary-text); }
.memory-log-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
}
.memory-log-card {
  background: rgba(255,255,255,0.42);
}
.memory-log-header {
  cursor: pointer;
  gap: 12px;
}
.memory-log-main {
  min-width: 0;
  flex: 1;
}
.memory-log-main .memory-title {
  margin-bottom: 0;
  margin-top: 4px;
}
.memory-log-side {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  flex-shrink: 0;
}
.memory-log-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 8px;
  border-radius: 999px;
  background: rgba(214,140,158,0.18);
  color: var(--deep-mauve);
  font-size: 10px;
  font-weight: 700;
}
.memory-log-toggle-label {
  font-size: 11px;
  color: var(--secondary-text);
  font-weight: 600;
}
.memory-log-body {
  display: none;
}
.memory-log-body.expanded {
  display: block;
}
.memory-log-content {
  font-size: 12px;
  color: var(--primary-text);
  line-height: 1.6;
  white-space: pre-wrap;
}

/* AI Memories */
.ai-memory-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px; border-radius: var(--radius-xs);
  background: rgba(255,255,255,0.3); margin-bottom: 6px;
}
.ai-memory-content { flex: 1; font-size: 13px; color: var(--primary-text); line-height: 1.4; }
.ai-memory-time { font-size: 10px; color: var(--secondary-text); }
.ai-memory-delete {
  background: none; border: none; color: var(--danger); cursor: pointer;
  padding: 2px;
}

/* ========================================
   REMINDERS PAGE
   ======================================== */
.reminder-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px; border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.4); margin-bottom: 8px;
}
.reminder-info { flex: 1; }
.reminder-content { font-size: 14px; font-weight: 600; color: var(--primary-text); }
.reminder-meta { font-size: 11px; color: var(--secondary-text); margin-top: 2px; }
.reminder-status {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 10px;
  font-size: 10px; font-weight: 600;
}
.reminder-status.pending { background: var(--warning-bg); color: var(--warning); }
.reminder-status.delivered { background: rgba(166,226,182,0.2); color: var(--success-dark); }

/* ========================================
   SETTINGS PAGE
   ======================================== */
.settings-section {
  background: var(--glass-surface); border: 1px solid var(--glass-border);
  border-radius: var(--radius-md); padding: var(--space-sm);
  margin-bottom: var(--space-sm);
}
.settings-section h4 {
  font-size: 14px; font-weight: 700; color: var(--deep-mauve);
  margin-bottom: var(--space-sm); display: flex; align-items: center; gap: 6px;
}
.setting-item {
  margin-bottom: 12px;
}
.setting-item label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--secondary-text); margin-bottom: 4px;
}
.setting-item input[type="text"],
.setting-item input[type="password"],
.setting-item input[type="number"],
.setting-item select,
.setting-item textarea {
  width: 100%; border: 1px solid var(--glass-border);
  background: rgba(255,255,255,0.5); border-radius: var(--radius-xs);
  padding: 10px 12px; font-size: 13px; font-family: var(--font-body);
  color: var(--primary-text); outline: none;
}
.setting-item input:focus,
.setting-item select:focus,
.setting-item textarea:focus { border-color: var(--accent); }
.setting-item.toggle {
  display: flex; justify-content: space-between; align-items: center;
}
.setting-item.toggle label { margin-bottom: 0; }
.switch { position: relative; display: inline-block; width: 44px; height: 24px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
  background: #ccc; border-radius: 24px; transition: 0.3s;
}
.slider::before {
  content: ''; position: absolute; height: 18px; width: 18px;
  left: 3px; bottom: 3px; background: white; border-radius: 50%;
  transition: 0.3s;
}
.switch input:checked + .slider { background: var(--accent); }
.switch input:checked + .slider::before { transform: translateX(20px); }
.theme-selector { display: flex; gap: 8px; }
.theme-option {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer; transition: 0.2s;
}
.theme-option.active { border-color: var(--primary-text); transform: scale(1.15); }
.setting-actions { display: flex; flex-direction: column; gap: 8px; }
.about-info { font-size: 13px; color: var(--secondary-text); line-height: 1.6; }
.about-info strong { color: var(--primary-text); }

/* Gateway status in settings */
.gateway-info-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-bottom: var(--space-sm);
}
.gateway-info-item {
  background: rgba(255,255,255,0.3); border-radius: var(--radius-xs);
  padding: 10px; text-align: center;
}
.gateway-info-label { font-size: 11px; color: var(--secondary-text); display: block; margin-bottom: 4px; }
.gateway-info-value { font-size: 16px; font-weight: 700; color: var(--primary-text); }

/* ========================================
   Buttons
   ======================================== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 18px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600; font-family: var(--font-body);
  border: none; cursor: pointer; transition: all 0.2s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--deep-mauve)); color: white; }
.btn-secondary { background: rgba(255,255,255,0.5); color: var(--primary-text); border: 1px solid var(--glass-border); }
.btn-danger { background: var(--danger-bg); color: var(--danger); }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: var(--radius-xs); }
.btn-block { width: 100%; }
.btn-save { margin-top: var(--space-sm); }

.action-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.4); border: none;
  display: flex; align-items: center; justify-content: center;
  color: var(--secondary-text); cursor: pointer;
}
.action-btn.delete { color: var(--danger); }

/* ========================================
   Forms
   ======================================== */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--secondary-text); margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; border: 1px solid var(--glass-border);
  background: rgba(255,255,255,0.5); border-radius: var(--radius-xs);
  padding: 10px 12px; font-size: 13px; font-family: var(--font-body);
  color: var(--primary-text); outline: none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--accent);
}
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }

/* ========================================
   Tab Bar
   ======================================== */
.tab-bar {
  position: absolute; bottom: 0; left: 0; width: 100%;
  height: calc(64px + env(safe-area-inset-bottom, 0px));
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--glass-border);
  display: flex; justify-content: space-around; align-items: flex-start;
  padding-top: 10px; z-index: 20;
}
.tab-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 3px; width: 56px; cursor: pointer;
}
.tab-icon { color: var(--secondary-text); transition: color 0.3s; }
.tab-label {
  font-size: 10px; font-weight: 600; color: var(--secondary-text);
  transition: color 0.3s;
}
.tab-item.active .tab-icon {
  color: var(--deep-mauve);
  filter: drop-shadow(0 2px 4px rgba(142,96,109,0.3));
}
.tab-item.active .tab-label { color: var(--deep-mauve); }

/* ========================================
   Toast
   ======================================== */
#toast-container {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.toast {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: 20px;
  background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
  box-shadow: 0 4px 16px rgba(142,96,109,0.15);
  font-size: 13px; font-weight: 500; color: var(--primary-text);
  opacity: 0; transform: translateY(-10px);
  transition: all 0.3s ease;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast-success { border-left: 3px solid var(--success); }
.toast-error { border-left: 3px solid var(--danger); }
.toast-warning { border-left: 3px solid var(--warning); }
.toast-info { border-left: 3px solid var(--info); }

/* ========================================
   Modal
   ======================================== */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(106,68,79,0.3); backdrop-filter: blur(4px);
  z-index: 1000; display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; transition: opacity 0.3s;
}
.modal-overlay.show { opacity: 1; }
.modal-container {
  width: 100%; max-width: 420px; max-height: 85vh;
  background: linear-gradient(160deg, var(--bg-gradient-start), var(--bg-gradient-end));
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform 0.3s ease;
}
.modal-overlay.show .modal-container { transform: translateY(0); }
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: var(--space-md) var(--space-md) var(--space-sm);
}
.modal-header h3 {
  font-family: var(--font-display); font-size: 18px;
  color: var(--primary-text); font-weight: 700;
}
.modal-close {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.5); border: none;
  font-size: 18px; color: var(--secondary-text); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal-body {
  flex: 1; overflow-y: auto; padding: 0 var(--space-md);
  scrollbar-width: none;
}
.modal-body::-webkit-scrollbar { display: none; }
.modal-footer {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: var(--space-sm) var(--space-md) var(--space-md);
}

/* ========================================
   Empty States
   ======================================== */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  padding: 40px var(--space-md); text-align: center;
}
.empty-state .empty-icon { color: var(--secondary-text); opacity: 0.4; margin-bottom: 12px; }
.empty-state p { font-size: 14px; color: var(--secondary-text); margin-bottom: var(--space-sm); }
.empty-text { text-align: center; padding: 16px; font-size: 13px; color: var(--secondary-text); }

/* ========================================
   Animations
   ======================================== */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes typing { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
@keyframes bubblePopIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

.updated { animation: pulse 0.5s ease; }

.auth-overlay { position: fixed; inset: 0; z-index: 9999; display: none; align-items: center; justify-content: center; background: rgba(243,229,233,0.75); backdrop-filter: blur(16px); }
.auth-card { width: min(92vw, 360px); background: rgba(255,255,255,0.82); border: 1px solid var(--glass-border); border-radius: 28px; box-shadow: var(--shadow-lg); padding: 24px; }
.auth-card h2 { margin: 0 0 10px; font-size: 22px; color: var(--primary-text); }
.auth-card p { margin: 0 0 14px; font-size: 14px; color: var(--secondary-text); }
.auth-input { width: 100%; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.85); border-radius: 16px; padding: 14px 16px; font-size: 16px; outline: none; margin-bottom: 12px; }
.auth-submit { width: 100%; border: none; border-radius: 16px; padding: 14px 16px; background: linear-gradient(135deg, var(--petal-pink), var(--accent-light)); color: var(--deep-mauve); font-weight: 700; font-size: 15px; }
.auth-error { min-height: 20px; margin-top: 10px; color: #b42318; font-size: 13px; }

/* ========================================
   Scrollbar hide global
   ======================================== */
::-webkit-scrollbar { width: 0; height: 0; }

/* ========================================
   Theme Variants
   ======================================== */

  --bg-base: #E3EFF9; --bg-gradient-start: #E8F1FA; --bg-gradient-end: #C1D4E3;
  --deep-mauve: #4A6FA5; --petal-pink: #D0E1F5; --accent: #6B9BD2;

}
[data-theme="purple"] {

  --deep-mauve: #7B5EA7; --petal-pink: #E0D0F0; --accent: #9B7DC4;
  --primary-text: #524060; --secondary-text: #8B7898;
}
[data-theme="green"] {
  --bg-base: #E5F3E9; --bg-gradient-start: #E8F5EC; --bg-gradient-end: #C1E3CB;
  --deep-mauve: #5E8E6D; --petal-pink: #D0F0D8; --accent: #7DBF8E;
  --primary-text: #3F5F4A; --secondary-text: #78A383;
}
[data-theme="orange"] {
  --bg-base: #F3ECE5; --bg-gradient-start: #F5F0E8; --bg-gradient-end: #E3D1C1;
  --deep-mauve: #8E7A5E; --petal-pink: #F0E0D0; --accent: #D6A86C;
  --primary-text: #5F4F3F; --secondary-text: #A3917B;
}

/* Safe area padding for bottom */
.page-inner { padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)); }

          <svg class="icon"><use href="#i-plus"/></svg>
        </button>
        <textarea id="chat-input" rows="1" placeholder="说点什么..." onkeydown="app.handleChatKeydown(event)"></textarea>
        <button class="chat-send-btn" onclick="app.sendMessage()">
          <svg class="icon"><use href="#i-send"/></svg>
        </button>
      </div>
    </div>

    <!-- ======== MEMORY PAGE ======== -->
    <div class="page" id="page-memory">
      <div class="page-inner">
        <div class="page-header">
          <button class="back-btn" onclick="app.goBack()">
            <svg class="icon"><use href="#i-back"/></svg>
          </button>
          <span class="page-title">Memory</span>
          <div class="page-actions">
            <button class="action-btn delete" id="memory-clear-btn" onclick="app.clearAllMemories()" title="一键清空记忆与日志">
              <svg class="icon"><use href="#i-trash"/></svg>
            </button>
            <button class="action-btn" id="memory-add-btn" onclick="app.showAddMemoryModal()" title="添加记忆">
              <svg class="icon"><use href="#i-plus"/></svg>
            </button>
          </div>
        </div>

        <!-- Search bar -->
        <div style="margin-bottom:var(--space-sm);position:relative;">
          <input type="text" id="memory-search" placeholder="搜索记忆..." style="width:100%;border:1px solid var(--glass-border);background:rgba(255,255,255,0.5);border-radius:20px;padding:10px 16px 10px 40px;font-size:13px;font-family:var(--font-body);color:var(--primary-text);outline:none;">
          <svg class="icon-sm" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--secondary-text);"><use href="#i-search"/></svg>
        </div>

        <!-- Category tabs -->
        <div class="memory-tabs" id="memory-tabs"></div>

        <!-- Memory content -->
        <div id="memory-content"></div>
      </div>
    </div>

    <!-- ======== REMINDERS PAGE ======== -->
    <div class="page" id="page-reminders">
      <div class="page-inner">
        <div class="page-header">
          <button class="back-btn" onclick="app.goBack()">
            <svg class="icon"><use href="#i-back"/></svg>
          </button>
          <span class="page-title">Reminders</span>
          <button class="action-btn" onclick="app.showAddReminderModal()">
            <svg class="icon"><use href="#i-plus"/></svg>
          </button>
        </div>
        <div id="reminders-content"></div>
      </div>
    </div>

    <!-- ======== SETTINGS PAGE ======== -->
    <div class="page" id="page-settings">
      <div class="page-inner">
        <div class="page-header">
          <button class="back-btn" onclick="app.goBack()">
            <svg class="icon"><use href="#i-back"/></svg>
          </button>
          <span class="page-title">Settings</span>
          <button class="action-btn" onclick="app.refreshGatewayConfig()">
            <svg class="icon"><use href="#i-refresh"/></svg>
          </button>
        </div>

        <!-- Gateway Status -->
        <div id="settings-gateway-status"></div>

        <!-- Settings content rendered by JS -->
        <div id="settings-content"></div>
      </div>
    </div>

  </div><!-- end content-area -->

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item active" data-page="home" onclick="app.showHome()">
      <span class="tab-icon"><svg class="icon"><use href="#i-home"/></svg></span>
      <span class="tab-label">首页</span>
    </div>
    <div class="tab-item" data-page="chat" onclick="app.showChat()">
      <span class="tab-icon"><svg class="icon"><use href="#i-chat"/></svg></span>
      <span class="tab-label">聊天</span>
    </div>
    <div class="tab-item" data-page="memory" onclick="app.showMemory()">
      <span class="tab-icon"><svg class="icon"><use href="#i-memory"/></svg></span>
      <span class="tab-label">记忆</span>
    </div>
    <div class="tab-item" data-page="settings" onclick="app.showSettings()">
      <span class="tab-icon"><svg class="icon"><use href="#i-settings"/></svg></span>
      <span class="tab-label">设置</span>
    </div>
  </div>
</div>

<script src="app.js"></script>
  <div class="auth-overlay" id="auth-overlay">
    <div class="auth-card">
      <h2>先输入密码</h2>
      <p>页面现在改成站内登录，不再弹浏览器那个丑密码框。</p>
      <input class="auth-input" id="auth-password" type="password" placeholder="输入面板密码" autocomplete="current-password">
      <button class="auth-submit" type="button" onclick="app.submitDashboardLogin()">进入面板</button>
      <div class="auth-error" id="auth-error"></div>
    </div>
  </div>
</body>
</html>
