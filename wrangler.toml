name = "companion-memory-proxy"
main = "src/index.ts"
compatibility_date = "2026-04-01"

# Text variables live in the Cloudflare Dashboard. Do not put placeholder
# keys here, or a deploy can overwrite the real dashboard values.
# D1 binding is auto-filled by `npm run setup:cloudflare`.

[[vectorize]]
binding = "VECTORIZE"
index_name = "memo-kb"

[[queues.producers]]
binding = "MEMORY_QUEUE"
queue = "companion-memory"

[[queues.consumers]]
queue = "companion-memory"
max_batch_size = 10
max_batch_timeout = 30
